name: Deploy hycoat-api to Azure App Service

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'hycoat-api/**'
      - '.github/workflows/deploy-hycoat-api-azure.yml'
  workflow_dispatch:

permissions:
  contents: read

env:
  AZURE_WEBAPP_NAME: hycoat-dev-api
  WORKING_DIRECTORY: hycoat-api
  PUBLISH_DIRECTORY: published

concurrency:
  group: cd-api-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: hycoat-dev-api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore ${{ env.WORKING_DIRECTORY }}/hycoat-api.csproj

      - name: Publish
        run: dotnet publish ${{ env.WORKING_DIRECTORY }}/hycoat-api.csproj -c Release -o ${{ env.WORKING_DIRECTORY }}/${{ env.PUBLISH_DIRECTORY }} --no-restore /p:UseAppHost=false

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_HYCOAT_DEV_API }}
          package: ${{ env.WORKING_DIRECTORY }}/${{ env.PUBLISH_DIRECTORY }}
